<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Capsule Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#080808;color:#e2e2e2;font-size:13px;line-height:1.5;min-height:100vh}
button{cursor:pointer;font-family:inherit;font-size:12px;border:none;border-radius:5px;padding:4px 10px;transition:opacity .15s}
button:hover{opacity:.75}
button:disabled{opacity:.3;cursor:default}
input,textarea,select{font-family:inherit;background:#141414;border:1px solid #222;color:#e2e2e2;border-radius:6px;padding:7px 10px;outline:none;font-size:12px;width:100%}
input:focus,textarea:focus,select:focus{border-color:#333}
a{color:inherit;text-decoration:none}

/* ── Login ───────────────────────────────────────────────────── */
#login{display:none;align-items:center;justify-content:center;min-height:100vh}
.lbox{background:#0d0d0d;border:1px solid #1c1c1c;border-radius:10px;padding:32px;width:290px}
.lbox h1{font-size:15px;font-weight:700;margin-bottom:3px;letter-spacing:-.3px}
.lbox p{color:#444;font-size:11px;margin-bottom:22px}
.lfield{margin-bottom:10px}
.lfield label{display:block;font-size:10px;color:#444;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.lbtn{width:100%;padding:9px;background:#e8e8e8;color:#000;font-weight:600;font-size:12px;border-radius:6px;margin-top:4px;border:none}
.lerr{color:#f87171;font-size:11px;margin-top:7px;min-height:16px}

/* ── App shell ───────────────────────────────────────────────── */
#app{display:none;flex-direction:column;min-height:100vh}
.bar{display:flex;align-items:center;gap:14px;padding:0 18px;height:44px;border-bottom:1px solid #141414;background:#080808;position:sticky;top:0;z-index:100}
.brand{font-size:12px;font-weight:700;letter-spacing:.5px;color:#e8e8e8;white-space:nowrap}
.brand em{color:#333;font-style:normal;font-weight:400;margin-left:4px}
nav{display:flex;gap:1px;flex:1}
.tb{background:none;color:#444;border-radius:5px;padding:4px 11px;font-size:12px;border:1px solid transparent}
.tb.on{background:#141414;color:#e2e2e2;border-color:#1c1c1c}
.bar-r{display:flex;align-items:center;gap:8px;margin-left:auto}
.sdot{width:6px;height:6px;border-radius:50%;background:#2a2a2a;flex-shrink:0;transition:background .3s}
.sdot.ok{background:#22c55e;box-shadow:0 0 5px #22c55e55}
.sdot.err{background:#ef4444}
.ts{font-size:11px;color:#2a2a2a}
.bsm{background:#141414;color:#777;border:1px solid #1c1c1c;font-size:11px;padding:3px 9px;border-radius:5px}
.bgh{background:none;color:#333;font-size:11px;padding:3px 7px;border:none}
.bgh:hover{color:#777;opacity:1}

/* ── Content ─────────────────────────────────────────────────── */
.wrap{padding:20px;max-width:1300px;margin:0 auto;width:100%}

/* ── Stats ───────────────────────────────────────────────────── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:20px}
.sc{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:8px;padding:14px 14px 12px}
.sv{font-size:28px;font-weight:700;line-height:1;letter-spacing:-1.5px;color:#e8e8e8}
.sl{font-size:10px;color:#444;margin-top:5px;text-transform:uppercase;letter-spacing:.5px}

/* ── Section header ──────────────────────────────────────────── */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sh h2{font-size:12px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.5px}
.sh-r{display:flex;gap:6px;align-items:center}

/* ── Table ───────────────────────────────────────────────────── */
.tw{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:8px;overflow:hidden;margin-bottom:20px}
.tw table{width:100%;border-collapse:collapse}
.tw th{text-align:left;padding:8px 13px;font-size:10px;color:#333;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #141414;font-weight:500;white-space:nowrap}
.tw td{padding:8px 13px;border-bottom:1px solid #111;vertical-align:middle}
.tw tr:last-child td{border-bottom:none}
.tw tr.ck td{cursor:pointer}
.tw tr.ck:hover td{background:#0f0f0f}

/* ── Expand ──────────────────────────────────────────────────── */
.xrow{background:#090909}
.xrow td{padding:0!important}
.xi{padding:6px 13px 14px 26px}

/* ── Video rows ──────────────────────────────────────────────── */
.vr{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #111}
.vr:last-of-type{border-bottom:none}
.vn{color:#2a2a2a;font-size:11px;width:22px;flex-shrink:0;padding-top:2px;font-variant-numeric:tabular-nums}
.vi{flex:1;min-width:0}
.vt{font-size:12px;color:#60a5fa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vt a:hover{text-decoration:underline}
.ve{font-size:11px;color:#f87171;margin-top:1px}
.vm{font-size:11px;color:#333;margin-top:1px}
.vacts{display:flex;align-items:center;gap:5px;flex-shrink:0}

/* ── Inject form ─────────────────────────────────────────────── */
.injf{margin:4px 0 8px 22px;background:#0a0a0a;border:1px solid #1a1a1a;border-radius:6px;padding:10px}
.injf label{display:block;font-size:10px;color:#444;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.injf textarea{height:90px;resize:vertical;font-family:monospace;font-size:11px;line-height:1.5}
.injf-acts{display:flex;gap:6px;margin-top:7px}

/* ── Action cards ────────────────────────────────────────────── */
.acrow{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.ac{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:8px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:14px;min-width:220px}
.ac-info label{font-size:12px;color:#999;display:block;font-weight:500}
.ac-info p{font-size:11px;color:#333;margin-top:2px}

/* ── Pills ───────────────────────────────────────────────────── */
.pill{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;white-space:nowrap;letter-spacing:.2px}
.pg{background:#14532d18;color:#4ade80;border:1px solid #14532d40}
.pb{background:#1e3a5f18;color:#60a5fa;border:1px solid #1e3a5f40}
.pa{background:#78350f18;color:#fbbf24;border:1px solid #78350f40}
.pr{background:#7f1d1d18;color:#f87171;border:1px solid #7f1d1d40}
.pz{background:#1a1a1a;color:#444;border:1px solid #222}

/* ── Buttons ─────────────────────────────────────────────────── */
.btn{border-radius:5px;padding:3px 9px;font-size:11px;font-weight:500;border:1px solid transparent;white-space:nowrap}
.bg{background:#14532d18;color:#4ade80;border-color:#14532d44}.bg:hover{background:#14532d30}
.ba{background:#78350f18;color:#fbbf24;border-color:#78350f44}.ba:hover{background:#78350f30}
.bb{background:#1e3a5f18;color:#60a5fa;border-color:#1e3a5f44}.bb:hover{background:#1e3a5f30}
.bd{background:#7f1d1d18;color:#f87171;border-color:#7f1d1d44}.bd:hover{background:#7f1d1d30}
.bw{background:#1c1c1c;color:#888;border-color:#242424}.bw:hover{color:#ccc;border-color:#333}

/* ── Progress ────────────────────────────────────────────────── */
.prog{background:#181818;border-radius:99px;height:3px;width:72px;overflow:hidden;display:inline-block;vertical-align:middle}
.progb{background:#3b82f6;height:100%;border-radius:99px}
.progb.done{background:#22c55e}

/* ── Filter bar ──────────────────────────────────────────────── */
.fbar{display:flex;gap:3px}
.fb{background:#141414;color:#444;border:1px solid #1a1a1a;border-radius:5px;padding:3px 10px;font-size:11px}
.fb.on{background:#1c1c1c;color:#e2e2e2;border-color:#2a2a2a}

/* ── Row actions ─────────────────────────────────────────────── */
.ra{display:flex;gap:5px;align-items:center}

/* ── Toast ───────────────────────────────────────────────────── */
#toast{position:fixed;bottom:18px;right:18px;display:flex;flex-direction:column;gap:5px;z-index:9999}
.ti{background:#141414;border:1px solid #222;border-radius:7px;padding:8px 13px;font-size:12px;max-width:280px;animation:tin .18s ease;pointer-events:none}
.tok{border-color:#14532d55;color:#4ade80}
.terr{border-color:#7f1d1d55;color:#f87171}
.tinfo{border-color:#1e3a5f55;color:#60a5fa}
@keyframes tin{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* ── Misc ────────────────────────────────────────────────────── */
.empty{padding:28px;text-align:center;color:#2a2a2a;font-size:12px}
.loading{padding:22px;text-align:center;color:#333;font-size:12px}
.mono{font-family:'JetBrains Mono',monospace,monospace;font-size:11px}
.ell{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mb{margin-bottom:20px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="lbox">
    <h1>Capsule</h1>
    <p>Admin console</p>
    <div class="lfield">
      <label>Username</label>
      <input id="lu" type="text" placeholder="ohm" autocomplete="username">
    </div>
    <div class="lfield">
      <label>Password</label>
      <input id="lp" type="password" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="lbtn" onclick="doLogin()">Sign in</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="bar">
    <div class="brand">CAPSULE<em>admin</em></div>
    <nav>
      <button class="tb on" data-tab="overview"  onclick="goTab('overview',this)">Overview</button>
      <button class="tb"    data-tab="users"     onclick="goTab('users',this)">Users</button>
      <button class="tb"    data-tab="courses"   onclick="goTab('courses',this)">Courses</button>
      <button class="tb"    data-tab="jobs"       onclick="goTab('jobs',this)">Jobs</button>
      <button class="tb"    data-tab="emails"    onclick="goTab('emails',this)">Emails</button>
    </nav>
    <div class="bar-r">
      <div class="sdot" id="sdot"></div>
      <span class="ts" id="ts">—</span>
      <button class="bsm" onclick="loadData()">↻ Refresh</button>
      <button class="bgh" onclick="signout()">Sign out</button>
    </div>
  </div>

  <div class="wrap">
    <div id="tab-overview"></div>
    <div id="tab-users"   style="display:none"></div>
    <div id="tab-courses" style="display:none"></div>
    <div id="tab-jobs"    style="display:none"></div>
    <div id="tab-emails"  style="display:none"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────
let _tok  = localStorage.getItem('cap_tok') || '';
let _data = null;
let _tab  = 'overview';
let _emailFilter = 'all';
let _xCourses = new Set();
let _xUsers   = new Set();
let _poll     = null;

// ── Auth ──────────────────────────────────────────────────────────────────
async function doLogin() {
  const u = document.getElementById('lu').value.trim();
  const p = document.getElementById('lp').value;
  document.getElementById('lerr').textContent = '';
  try {
    const r = await fetch('/api/admin/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username: u, password: p})
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'Invalid credentials');
    _tok = d.token;
    localStorage.setItem('cap_tok', _tok);
    boot();
  } catch(e) {
    document.getElementById('lerr').textContent = e.message;
  }
}

function signout() {
  fetch('/api/admin/logout', {method: 'POST', headers: {'X-Admin-Token': _tok}}).catch(() => {});
  localStorage.removeItem('cap_tok');
  location.reload();
}

// ── API ───────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = {method, headers: {'X-Admin-Token': _tok}};
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(path, opts);
  const d = await r.json().catch(() => ({}));
  if (r.status === 401) { localStorage.removeItem('cap_tok'); location.reload(); }
  if (!r.ok) throw new Error(d.detail || 'HTTP ' + r.status);
  return d;
}

// ── Toast ─────────────────────────────────────────────────────────────────
function toast(msg, type) {
  const el = document.createElement('div');
  el.className = 'ti ' + (type === 'err' ? 'terr' : type === 'info' ? 'tinfo' : 'tok');
  el.textContent = msg;
  document.getElementById('toast').prepend(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Utils ─────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fd(s) {
  if (!s) return '—';
  try {
    const d = new Date(s.includes('T') && !s.endsWith('Z') ? s + 'Z' : s);
    return d.toLocaleDateString('en-IN', {day:'2-digit',month:'short'}) + ' ' +
           d.toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit',hour12:true});
  } catch { return s; }
}

function pill(status) {
  const m = {active:'pg',ready:'pg',done:'pg',sent:'pg',processing:'pa',pending:'pb',failed:'pr',cancelled:'pz',skipped:'pz',paused:'pz'};
  return `<span class="pill ${m[status]||'pz'}">${esc(status||'—')}</span>`;
}

function prog(val, done) {
  return `<div class="prog"><div class="progb${done?' done':''}" style="width:${val||0}%"></div></div>`;
}

// ── Boot ──────────────────────────────────────────────────────────────────
function boot() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display   = 'flex';
  const h = location.hash.slice(1);
  if (h) {
    const btn = document.querySelector(`[data-tab="${h}"]`);
    if (btn) goTab(h, btn);
  }
  loadData();
}

// ── Tabs ──────────────────────────────────────────────────────────────────
function goTab(name, btn) {
  _tab = name;
  location.hash = name;
  document.querySelectorAll('.tb').forEach(b => b.classList.toggle('on', b.dataset.tab === name));
  ['overview','users','courses','jobs','emails'].forEach(t =>
    document.getElementById('tab-' + t).style.display = t === name ? '' : 'none'
  );
  if (name === 'emails') loadEmails();
  if (name === 'jobs')   startPoll();
  else stopPoll();
}

// ── Data ──────────────────────────────────────────────────────────────────
async function loadData() {
  setStatus('loading');
  try {
    _data = await api('GET', '/api/admin/data');
    document.getElementById('ts').textContent = new Date().toLocaleTimeString('en-IN', {timeStyle:'short'});
    setStatus('ok');
    renderAll();
  } catch(e) {
    setStatus('err');
    toast('Load failed: ' + e.message, 'err');
  }
}

function setStatus(s) {
  const dot = document.getElementById('sdot');
  dot.className = 'sdot' + (s === 'ok' ? ' ok' : s === 'err' ? ' err' : '');
}

function renderAll() {
  renderOverview();
  renderUsers();
  renderCourses();
  renderJobs();
}

// ── Overview ──────────────────────────────────────────────────────────────
function renderOverview() {
  if (!_data) return;
  const s = _data.stats || {};
  const jobs = (_data.jobs || []).slice(0, 6);

  document.getElementById('tab-overview').innerHTML = `
    <div class="stats">
      <div class="sc"><div class="sv">${s.total_users||0}</div><div class="sl">Users</div></div>
      <div class="sc"><div class="sv">${s.active_courses||0}</div><div class="sl">Active Courses</div></div>
      <div class="sc"><div class="sv">${s.processing_courses||0}</div><div class="sl">Processing</div></div>
      <div class="sc"><div class="sv">${s.emails_sent||0}</div><div class="sl">Emails Sent</div></div>
      <div class="sc"><div class="sv">${s.emails_pending||0}</div><div class="sl">Pending</div></div>
      <div class="sc"><div class="sv">${s.emails_today||0}</div><div class="sl">Sent Today</div></div>
    </div>

    <div class="acrow">
      <div class="ac">
        <div class="ac-info">
          <label>Run Scheduler</label>
          <p>Send due emails + generate upcoming</p>
        </div>
        <button class="btn bg" id="btn-cron" onclick="runCron()">▶ Run</button>
      </div>
      <div class="ac">
        <div class="ac-info">
          <label>Advance Processing</label>
          <p>Queue next video for each active course</p>
        </div>
        <button class="btn ba" id="btn-adv" onclick="runAdvance()">▶ Advance</button>
      </div>
      <div class="ac">
        <div class="ac-info">
          <label>Download DB</label>
          <p>Snapshot capsule.db for backup</p>
        </div>
        <a href="/api/admin/db/download?token=${_tok}" class="btn bw" style="text-decoration:none;display:inline-flex;align-items:center">↓ Download</a>
      </div>
    </div>

    <div class="sh"><h2>Recent Jobs</h2></div>
    <div class="tw">${jobsTable(jobs)}</div>`;
}

async function runCron() {
  const btn = document.getElementById('btn-cron');
  if (!btn) return;
  btn.disabled = true; btn.textContent = '…';
  try {
    await api('POST', '/api/admin/cron/run');
    toast('Scheduler ran — emails sent');
    await loadData();
  } catch(e) { toast(e.message, 'err'); }
  finally { if (btn) { btn.disabled = false; btn.textContent = '▶ Run'; } }
}

async function runAdvance() {
  const btn = document.getElementById('btn-adv');
  if (!btn) return;
  btn.disabled = true; btn.textContent = '…';
  try {
    await api('POST', '/api/admin/cron/advance');
    toast('Advance processing triggered');
  } catch(e) { toast(e.message, 'err'); }
  finally { if (btn) { btn.disabled = false; btn.textContent = '▶ Advance'; } }
}

// ── Users ─────────────────────────────────────────────────────────────────
function renderUsers() {
  if (!_data) return;
  const users = _data.users || [];
  const rows = users.map(u => {
    const courses = (_data.courses || []).filter(c => c.user_id === u.id);
    return `
    <tr class="ck" onclick="toggleUser('${u.id}')">
      <td style="font-weight:500;max-width:200px" class="ell">${esc(u.email)}</td>
      <td><span class="mono">${esc(u.frequency||'—')}</span></td>
      <td style="color:#666">${esc(u.depth||'—')}</td>
      <td style="color:#666">${esc(u.tone||'—')}</td>
      <td style="color:#444" class="mono">${esc((u.timezone||'').replace('Asia/',''))}</td>
      <td style="color:#555;text-align:center">${courses.length}</td>
      <td>${u.paused ? pill('paused') : pill('active')}</td>
      <td style="color:#444;font-size:11px">${fd(u.created_at)}</td>
      <td onclick="event.stopPropagation()">
        <div class="ra">
          ${u.paused
            ? `<button class="btn bg" onclick="userResume('${u.id}')">Resume</button>`
            : `<button class="btn bw" onclick="userPause('${u.id}')">Pause</button>`}
          <button class="btn bd" onclick="userDelete('${u.id}','${esc(u.email)}')">Delete</button>
        </div>
      </td>
    </tr>
    <tr id="ux-${u.id}" class="xrow" style="display:none">
      <td colspan="9">
        <div class="xi" id="ux-i-${u.id}"><div class="loading">Loading…</div></div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('tab-users').innerHTML = `
    <div class="sh"><h2>Users (${users.length})</h2></div>
    <div class="tw">
      <table>
        <thead><tr>
          <th>Email</th><th>Freq</th><th>Depth</th><th>Tone</th><th>TZ</th>
          <th style="text-align:center">Courses</th><th>Status</th><th>Joined</th><th>Actions</th>
        </tr></thead>
        <tbody>${rows || '<tr><td colspan="9" class="empty">No users</td></tr>'}</tbody>
      </table>
    </div>`;
}

function toggleUser(uid) {
  const row = document.getElementById('ux-' + uid);
  if (_xUsers.has(uid)) {
    _xUsers.delete(uid);
    row.style.display = 'none';
    return;
  }
  _xUsers.add(uid);
  row.style.display = '';
  const inner = document.getElementById('ux-i-' + uid);
  const courses = (_data.courses || []).filter(c => c.user_id === uid);
  if (!courses.length) { inner.innerHTML = '<div style="color:#2a2a2a;font-size:12px;padding:6px 0">No courses</div>'; return; }
  inner.innerHTML = courses.map(c => `
    <div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #111">
      ${pill(c.status)}
      <span style="flex:1;font-size:12px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
            title="${esc(c.playlist_title||c.playlist_url)}">${esc(c.playlist_title||'Untitled')}</span>
      <span style="font-size:11px;color:#333">${c.videos_processed||0}/${c.total_videos||0} videos</span>
      <button class="btn bw" onclick="goTab('courses',document.querySelector('[data-tab=courses]'))">Open →</button>
    </div>`).join('');
}

async function userPause(id) {
  try { await api('POST', `/api/admin/users/${id}/pause`); toast('User paused'); await loadData(); }
  catch(e) { toast(e.message, 'err'); }
}
async function userResume(id) {
  try { await api('POST', `/api/admin/users/${id}/resume`); toast('User resumed'); await loadData(); }
  catch(e) { toast(e.message, 'err'); }
}
async function userDelete(id, email) {
  if (!confirm('Delete ' + email + ' and all their courses, videos, and emails?')) return;
  try { await api('DELETE', `/api/admin/users/${id}`); toast('User deleted'); await loadData(); }
  catch(e) { toast(e.message, 'err'); }
}

// ── Courses ───────────────────────────────────────────────────────────────
function renderCourses() {
  if (!_data) return;
  const courses = _data.courses || [];
  const rows = courses.map(c => {
    const pct = c.total_videos ? Math.round((c.videos_processed||0) / c.total_videos * 100) : 0;
    return `
    <tr class="ck" onclick="toggleCourse('${c.id}')">
      <td style="max-width:260px">
        <div class="ell" style="font-weight:500" title="${esc(c.playlist_title||c.playlist_url)}">${esc(c.playlist_title||'Untitled')}</div>
        <div style="font-size:11px;color:#333;margin-top:1px" class="ell">${esc(c.user_email||'')}</div>
      </td>
      <td>${pill(c.status)}</td>
      <td>
        <div style="display:flex;align-items:center;gap:7px">
          ${prog(pct, c.status === 'active')}
          <span style="font-size:11px;color:#444">${c.videos_processed||0}/${c.total_videos||0}</span>
        </div>
      </td>
      <td style="color:#444;font-size:11px">${fd(c.created_at)}</td>
      <td onclick="event.stopPropagation()">
        <div class="ra">
          <button class="btn ba" onclick="reprocess('${c.id}')">↻ Reprocess</button>
          ${c.paused
            ? `<button class="btn bg" onclick="courseResume('${c.id}')">Resume</button>`
            : `<button class="btn bw" onclick="coursePause('${c.id}')">Pause</button>`}
          <button class="btn bd" onclick="courseDelete('${c.id}')">Delete</button>
        </div>
      </td>
    </tr>
    <tr id="cx-${c.id}" class="xrow" style="display:none">
      <td colspan="5">
        <div class="xi" id="cx-i-${c.id}"><div class="loading">Loading videos…</div></div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('tab-courses').innerHTML = `
    <div class="sh"><h2>Courses (${courses.length})</h2></div>
    <div class="tw">
      <table>
        <thead><tr>
          <th>Course</th><th>Status</th><th>Progress</th><th>Created</th><th>Actions</th>
        </tr></thead>
        <tbody>${rows || '<tr><td colspan="5" class="empty">No courses</td></tr>'}</tbody>
      </table>
    </div>`;
}

async function toggleCourse(cid) {
  const row = document.getElementById('cx-' + cid);
  if (_xCourses.has(cid)) {
    _xCourses.delete(cid);
    row.style.display = 'none';
    return;
  }
  _xCourses.add(cid);
  row.style.display = '';
  await loadCourseVideos(cid);
}

async function loadCourseVideos(cid) {
  const inner = document.getElementById('cx-i-' + cid);
  if (!inner) return;
  try {
    const d = await api('GET', `/api/admin/courses/${cid}/videos`);
    const vids = d.videos || [];
    if (!vids.length) { inner.innerHTML = '<div style="color:#2a2a2a;font-size:12px;padding:6px 0">No videos</div>'; return; }
    inner.innerHTML = vids.map(v => videoRow(v, cid)).join('');
  } catch(e) {
    inner.innerHTML = `<div style="color:#f87171;font-size:12px;padding:6px 0">${esc(e.message)}</div>`;
  }
}

function videoRow(v, cid) {
  const yt = `https://youtube.com/watch?v=${esc(v.youtube_id)}`;
  const hasT = v.has_transcript;
  const canRetry = ['failed','skipped','pending'].includes(v.status);
  return `
  <div class="vr" id="vr-${v.id}">
    <div class="vn">${(v.position||0)+1}</div>
    <div class="vi">
      <div class="vt"><a href="${yt}" target="_blank">${esc(v.title||'Untitled')}</a></div>
      ${v.error_msg ? `<div class="ve">${esc(v.error_msg)}</div>` : ''}
      <div class="vm">${v.email_count||0} emails</div>
    </div>
    <div class="vacts">
      ${pill(v.status)}
      ${hasT ? `<button class="btn bb" onclick="viewTx('${v.id}')">Transcript</button>` : ''}
      ${canRetry ? `
        <button class="btn ba" onclick="retryVid('${v.id}','${cid}')">↻ Retry</button>
        <button class="btn bw" onclick="toggleInject('${v.id}')">Inject</button>
      ` : ''}
    </div>
  </div>
  <div id="inj-${v.id}" style="display:none">
    <div class="injf">
      <label>Paste transcript (min 100 chars) — saves + queues processing</label>
      <textarea id="inj-t-${v.id}" placeholder="Paste transcript text here…"></textarea>
      <div class="injf-acts">
        <button class="btn bg" onclick="submitInject('${v.id}','${cid}')">✓ Save &amp; Retry</button>
        <button class="btn bw" onclick="toggleInject('${v.id}')">Cancel</button>
      </div>
    </div>
  </div>`;
}

function toggleInject(vid) {
  const el = document.getElementById('inj-' + vid);
  if (!el) return;
  const open = el.style.display !== 'none';
  el.style.display = open ? 'none' : '';
  if (!open) el.querySelector('textarea').focus();
}

async function submitInject(vid, cid) {
  const text = (document.getElementById('inj-t-' + vid).value || '').trim();
  if (text.length < 100) { toast('Need at least 100 chars', 'err'); return; }
  try {
    await api('POST', `/api/admin/videos/${vid}/inject-transcript`, {text});
    toast('Transcript saved — processing queued');
    document.getElementById('inj-' + vid).style.display = 'none';
    await loadCourseVideos(cid);
  } catch(e) { toast(e.message, 'err'); }
}

async function retryVid(vid, cid) {
  try {
    await api('POST', `/api/admin/videos/${vid}/retry`);
    toast('Retry queued');
    await loadCourseVideos(cid);
  } catch(e) { toast(e.message, 'err'); }
}

async function viewTx(vid) {
  try {
    const d = await api('GET', `/api/admin/videos/${vid}/transcript`);
    const w = window.open('', '_blank', 'width=720,height=640,scrollbars=yes');
    w.document.write(`<html><head><style>
      body{margin:0;background:#080808;color:#bbb;font-family:monospace;font-size:12px;
           padding:20px;line-height:1.7;white-space:pre-wrap;word-wrap:break-word}
    </style></head><body>${esc(d.transcript)}</body></html>`);
    w.document.close();
  } catch(e) { toast(e.message, 'err'); }
}

async function reprocess(cid) {
  if (!confirm('Reprocess all failed/skipped videos in this course?')) return;
  try {
    const d = await api('POST', `/api/admin/courses/${cid}/reprocess`);
    toast('Reprocess queued — job ' + d.job_id.slice(0,8));
    await loadData();
  } catch(e) { toast(e.message, 'err'); }
}

async function coursePause(cid) {
  try { await api('POST', `/api/admin/courses/${cid}/pause`); toast('Course paused'); await loadData(); }
  catch(e) { toast(e.message, 'err'); }
}
async function courseResume(cid) {
  try { await api('POST', `/api/admin/courses/${cid}/resume`); toast('Course resumed'); await loadData(); }
  catch(e) { toast(e.message, 'err'); }
}
async function courseDelete(cid) {
  if (!confirm('Delete this course and all its emails and videos?')) return;
  try { await api('DELETE', `/api/admin/courses/${cid}`); toast('Course deleted'); await loadData(); }
  catch(e) { toast(e.message, 'err'); }
}

// ── Jobs ──────────────────────────────────────────────────────────────────
function renderJobs() {
  if (!_data) return;
  const jobs = _data.jobs || [];
  document.getElementById('tab-jobs').innerHTML = `
    <div class="sh"><h2>Jobs (${jobs.length})</h2>
      <div class="sh-r">
        <span style="font-size:11px;color:#333" id="poll-lbl"></span>
        <button class="bsm" onclick="loadData()">↻</button>
      </div>
    </div>
    <div class="tw">${jobsTable(jobs)}</div>`;
  updatePollLabel();
}

function jobsTable(jobs) {
  if (!jobs.length) return '<div class="empty">No jobs</div>';
  return `<table>
    <thead><tr>
      <th>ID</th><th>Type</th><th>Status</th><th>Progress</th><th>Message</th><th>Updated</th><th>Actions</th>
    </tr></thead>
    <tbody>${jobs.map(j => `
      <tr>
        <td class="mono" style="color:#2a2a2a">${j.id.slice(0,8)}</td>
        <td style="color:#666">${esc(j.type||'')}</td>
        <td>${pill(j.status)}</td>
        <td>
          <div style="display:flex;align-items:center;gap:7px">
            ${prog(j.progress||0, j.status==='done')}
            <span style="font-size:11px;color:#444">${j.progress||0}%</span>
          </div>
        </td>
        <td style="max-width:240px;color:#444;font-size:11px" class="ell">${esc(j.message||'')}</td>
        <td style="color:#333;font-size:11px">${fd(j.updated_at||j.created_at)}</td>
        <td>
          <div class="ra">
            ${['pending','failed'].includes(j.status)
              ? `<button class="btn ba" onclick="requeueJob('${j.id}')">↻ Requeue</button>` : ''}
            ${j.status === 'processing'
              ? `<button class="btn bd" onclick="cancelJob('${j.id}')">Stop</button>` : ''}
          </div>
        </td>
      </tr>`).join('')}
    </tbody></table>`;
}

function startPoll() {
  stopPoll();
  _poll = setInterval(async () => {
    if (_tab !== 'jobs') { stopPoll(); return; }
    const hasActive = (_data?.jobs || []).some(j => j.status === 'processing');
    if (!hasActive) { stopPoll(); updatePollLabel(); return; }
    try {
      _data = await api('GET', '/api/admin/data');
      renderJobs();
    } catch(e) {}
  }, 5000);
  updatePollLabel();
}

function stopPoll() {
  if (_poll) { clearInterval(_poll); _poll = null; }
}

function updatePollLabel() {
  const lbl = document.getElementById('poll-lbl');
  if (!lbl) return;
  const hasActive = (_data?.jobs || []).some(j => j.status === 'processing');
  lbl.textContent = hasActive ? 'auto-refreshing…' : '';
}

async function requeueJob(id) {
  try { await api('POST', `/api/admin/jobs/${id}/requeue`); toast('Requeued'); await loadData(); renderJobs(); }
  catch(e) { toast(e.message, 'err'); }
}
async function cancelJob(id) {
  try { await api('POST', `/api/admin/jobs/${id}/cancel`); toast('Stopped'); await loadData(); renderJobs(); }
  catch(e) { toast(e.message, 'err'); }
}

// ── Emails ────────────────────────────────────────────────────────────────
async function loadEmails() {
  const el = document.getElementById('tab-emails');
  el.innerHTML = '<div class="loading">Loading…</div>';
  try {
    const qs = _emailFilter === 'all' ? '' : '&status=' + _emailFilter;
    const d = await api('GET', '/api/admin/emails?limit=200' + qs);
    const emails = d.emails || [];

    const filters = ['all','pending','sent','failed','cancelled'].map(f =>
      `<button class="fb${_emailFilter===f?' on':''}" onclick="setEF('${f}')">${f==='all'?'All':f[0].toUpperCase()+f.slice(1)}</button>`
    ).join('');

    const rows = emails.map(e => `
      <tr>
        <td style="max-width:220px" class="ell">${esc(e.subject||'(no subject)')}</td>
        <td style="color:#555;font-size:11px" class="ell">${esc(e.user_email||'')}</td>
        <td><span class="mono" style="color:#444">${esc(e.slot||'—')}</span></td>
        <td style="color:#444;font-size:11px">${fd(e.scheduled_at)}</td>
        <td>${pill(e.status)}</td>
        <td style="color:#444;font-size:11px;text-align:center">${e.open_count||0}</td>
        <td>
          <div class="ra">
            <button class="btn bb" onclick="previewEmail('${e.id}')">Preview</button>
            ${e.status === 'pending'
              ? `<button class="btn bg" onclick="sendNow('${e.id}')">Send</button>
                 <button class="btn bd" onclick="cancelEmail('${e.id}')">Cancel</button>` : ''}
            ${e.status === 'sent'
              ? `<button class="btn bw" onclick="resendEmail('${e.id}')">Resend</button>` : ''}
          </div>
        </td>
      </tr>`).join('');

    el.innerHTML = `
      <div class="sh">
        <h2>Emails (${emails.length})</h2>
        <div class="fbar">${filters}</div>
      </div>
      <div class="tw">
        <table>
          <thead><tr>
            <th>Subject</th><th>User</th><th>Slot</th><th>Scheduled</th>
            <th>Status</th><th style="text-align:center">Opens</th><th>Actions</th>
          </tr></thead>
          <tbody>${rows || '<tr><td colspan="7" class="empty">No emails</td></tr>'}</tbody>
        </table>
      </div>`;
  } catch(e) {
    el.innerHTML = `<div class="empty" style="color:#f87171">${esc(e.message)}</div>`;
  }
}

function setEF(f) { _emailFilter = f; loadEmails(); }

async function previewEmail(id) {
  try {
    const d = await api('GET', '/api/admin/emails/' + id);
    const html = d.html_body || '<pre style="color:#ccc;background:#080808;padding:20px;font-size:12px">' + esc(d.plain_body||'(no content)') + '</pre>';
    const w = window.open('', '_blank', 'width=680,height=720,scrollbars=yes');
    w.document.write(html);
    w.document.close();
  } catch(e) { toast(e.message, 'err'); }
}

async function sendNow(id) {
  try { await api('POST', `/api/admin/emails/${id}/send-now`); toast('Sent!'); loadEmails(); }
  catch(e) { toast(e.message, 'err'); }
}
async function resendEmail(id) {
  try { await api('POST', `/api/admin/emails/${id}/resend`); toast('Resent'); loadEmails(); }
  catch(e) { toast(e.message, 'err'); }
}
async function cancelEmail(id) {
  try { await api('POST', `/api/admin/emails/${id}/cancel`); toast('Cancelled'); loadEmails(); }
  catch(e) { toast(e.message, 'err'); }
}

// ── Init ──────────────────────────────────────────────────────────────────
if (_tok) {
  boot();
} else {
  document.getElementById('login').style.display = 'flex';
}
</script>
</body>
</html>
